services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: appointment-agent-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: appointment-agent-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: appointment-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: appointment_agent
      MYSQL_USER: appointment_user
      MYSQL_PASSWORD: appointment_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - appointment_mysql_data:/var/lib/mysql

volumes:
  appointment_mysql_data:
  frontend_node_modules:
